<style>
/* ─── RESET ─── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f4f3ef;min-height:100vh;-webkit-text-size-adjust:100%}
*{box-sizing:border-box;margin:0;padding:0}
#wrap{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f3ef;color:#1a1a1a;position:relative}
.hdr{background:#003B28;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hdr-l h1{font-weight:800;font-size:15px;color:#fff;letter-spacing:.3px}
.hdr-l p{font-size:10px;color:#00AB29;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.hdr-r{display:flex;align-items:center;gap:10px}
.pill-copa{background:#FF1025;padding:5px 14px;border-radius:99px;font-size:11px;font-weight:700;color:#fff}
.dl-btn{background:#00AB29;color:#fff;border:none;padding:6px 14px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px}
.dl-btn:hover{background:#009922}

.leg-bar{background:#fff;border-bottom:1px solid #e8e7e3;padding:9px 22px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:11px;color:#555}
.leg{display:flex;align-items:center;gap:5px}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0}

.tabs-bar{padding:14px 22px 0;background:#f4f3ef}
.tabs-inner{display:flex;gap:0;background:#fff;border-radius:10px;border:1px solid #e0e0db;overflow:hidden}
.tab{padding:9px 0;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#999;border-bottom:3px solid transparent;flex:1;text-align:center;transition:all .15s}
.tab:hover:not(.active){background:#f7f7f4;color:#333}
.tab.active{color:#00AB29;border-bottom-color:#00AB29;background:#f7fdf7}

.main{padding:20px 22px;max-width:1200px;margin:0 auto}
.mhdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.mt{font-size:42px;font-weight:900;color:#00AB29;text-transform:uppercase;letter-spacing:-2px;line-height:1}
.ms{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:1.5px;margin-top:5px;font-weight:500}
.stats{display:flex;gap:8px}
.stat{background:#fff;border-radius:8px;padding:7px 14px;text-align:center;border:1.5px solid #00AB29}
.sn{font-weight:900;font-size:20px;color:#00AB29;line-height:1}
.sl{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

.obj{background:#f0faf4;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:#444;border:1px solid #c8ecd4;border-left:4px solid #00AB29;border-radius:0 8px 8px 0;line-height:1.65}
.obj b{color:#00AB29;font-size:10px;text-transform:uppercase;letter-spacing:.8px}

.dh-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.dh{text-align:center;font-size:10px;font-weight:700;color:#00AB29;text-transform:uppercase;padding:5px 0;letter-spacing:.5px}

.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cell{min-height:90px;border-radius:8px;padding:8px;border:1px solid #e8e7e3;background:#fff;position:relative;transition:transform .12s,box-shadow .12s}
.cell.emp{background:transparent;border-color:transparent}
.cell.hp{cursor:pointer}
.cell.hp:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,59,40,.1);border-color:#b0d4bc}
.cell.copa{border:2px solid #FF1025;background:#fff}
.cell.copa:hover{box-shadow:0 4px 14px rgba(255,16,37,.12)}
.cn{font-size:13px;font-weight:700;color:#ccc;margin-bottom:6px}
.hp .cn{color:#1a1a1a}
.ctag{display:block;font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;margin-bottom:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.4px}
.ctitle{font-size:9px;color:#555;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;font-weight:500}
.cbadge{position:absolute;top:6px;right:6px;background:#FF1025;color:#fff;font-size:7px;font-weight:800;padding:1px 5px;border-radius:3px;letter-spacing:.5px}

.ov{display:none;position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:99;align-items:flex-start;justify-content:center;padding:20px}
.ov.open{display:flex}
.modal{background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.18);max-width:500px;width:100%;padding:24px;position:relative;margin-top:56px;border:1px solid #e0e0db}
.mx{position:absolute;top:12px;right:12px;background:#f4f3ef;border:1px solid #e0e0db;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:13px;color:#666;display:flex;align-items:center;justify-content:center}
.mx:hover{background:#e8e7e3}
.md{font-size:10px;color:#00AB29;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.mt_{font-size:18px;font-weight:800;color:#1a1a1a;margin-bottom:10px;line-height:1.3}
.msec{margin-top:13px}
.mlbl{font-size:9px;font-weight:700;text-transform:uppercase;color:#00AB29;letter-spacing:.8px;margin-bottom:4px}
.mtxt{font-size:12px;color:#444;line-height:1.65}
.mcopy{font-size:12px;color:#003B28;font-style:italic;background:#f0faf4;padding:10px 12px;border-radius:6px;border-left:3px solid #00AB29;line-height:1.65;font-weight:500}
.mplat{font-size:11px;color:#555;background:#f4f3ef;padding:7px 10px;border-radius:6px;line-height:1.5}
/* Override: modal uses fixed para funcionar standalone */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.ov.open{display:flex}
.modal{background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.18);max-width:500px;width:100%;padding:24px;position:relative;border:1px solid #e0e0db;margin:auto}
/* ─── STICKY HEADER ─── */
.hdr { position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,.12); }

/* ─── TABLET (641–900px) ─── */
@media (min-width: 641px) and (max-width: 900px) {
  .main { padding: 16px 18px; }
  .cell { min-height: 78px; padding: 6px; }
  .ctitle { font-size: 8px; -webkit-line-clamp: 2; }
  .mt { font-size: 34px; }
  .stat { padding: 6px 10px; }
}

/* ─── MOBILE (≤640px) ─── */
@media (max-width: 640px) {

  /* Header compacto */
  .hdr { padding: 10px 14px; gap: 6px; }
  .hdr-l h1 { font-size: 13px; }
  .hdr-l p { font-size: 9px; letter-spacing: .8px; margin-top: 2px; }
  .pill-copa { display: none; }
  .dl-btn { padding: 7px 11px; font-size: 10px; border-radius: 6px; gap: 4px; }

  /* Legenda em 3 colunas */
  .leg-bar { padding: 8px 14px; gap: 6px 10px; display: grid; grid-template-columns: repeat(3, 1fr); }
  .leg { font-size: 10px; }
  .ld { width: 8px; height: 8px; }

  /* Tabs */
  .tabs-bar { padding: 10px 14px 0; }
  .tab { font-size: 12px; padding: 10px 0; }

  /* Conteúdo principal */
  .main { padding: 12px 14px; }

  /* Cabeçalho do mês: empilhar */
  .mhdr { flex-direction: column; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
  .mt { font-size: 30px; letter-spacing: -1px; }
  .ms { font-size: 9px; letter-spacing: 1px; margin-top: 3px; }
  .stats { gap: 6px; width: 100%; }
  .stat { flex: 1; padding: 6px 8px; }
  .sn { font-size: 17px; }
  .sl { font-size: 8px; }

  /* Objetivo */
  .obj { font-size: 10px; padding: 8px 10px 8px 12px; margin-bottom: 10px; }

  /* Grade do calendário — compacta */
  .dh-row { gap: 2px; margin-bottom: 2px; }
  .dh { font-size: 8px; padding: 4px 0; letter-spacing: 0; }
  .cgrid { gap: 2px; }
  .cell { min-height: 54px; padding: 5px 3px 3px; border-radius: 6px; }
  .cell.hp:hover { transform: none; box-shadow: none; }
  .cell.hp:active { background: #f0faf4; transform: scale(.97); transition: transform .08s; }
  .cell.copa:active { background: #fff5f5; }
  .cn { font-size: 11px; font-weight: 700; margin-bottom: 2px; }
  .ctag { font-size: 6px; padding: 2px 3px; border-radius: 2px; margin-bottom: 0; letter-spacing: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ctitle { display: none; }
  .cbadge { font-size: 6px; padding: 1px 3px; top: 3px; right: 3px; border-radius: 2px; letter-spacing: 0; }

  /* Modal: centralizado no mobile */
  .ov {
    position: fixed !important;
    inset: 0 !important;
    align-items: center !important;
    justify-content: center !important;
    padding: 16px !important;
    z-index: 1000 !important;
  }
  .modal {
    border-radius: 14px !important;
    width: calc(100vw - 32px) !important;
    max-width: calc(100vw - 32px) !important;
    box-sizing: border-box !important;
    margin: 0 !important;
    padding: 20px 16px 24px !important;
    max-height: 88vh !important;
    overflow-y: auto !important;
    overflow-x: hidden !important;
    border: 1px solid #e0e0db !important;
    animation: mob-in .2s cubic-bezier(.32,.72,0,1) !important;
  }
  .mcopy, .mtxt, .mplat, .mt_ {
    overflow-wrap: break-word !important;
    word-break: break-word !important;
  }
  @keyframes mob-in {
    from { transform: scale(.95); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* Remove drag handle no mobile centralizado */
  .modal::before { display: none !important; }

  .mx { top: 22px; right: 14px; width: 32px; height: 32px; font-size: 13px; }
  .md { font-size: 10px; }
  .mt_ { font-size: 16px; margin-bottom: 8px; padding-right: 36px; }
  .msec { margin-top: 11px; }
  .mtxt { font-size: 11px; }
  .mcopy { font-size: 11px; padding: 8px 10px; }
  .mplat { font-size: 10px; padding: 6px 8px; }
  .mlbl { font-size: 9px; margin-bottom: 3px; }
}
</style>

var cur="maio";

function buildLeg(){
  var el=document.getElementById("leg");
  el.innerHTML="";
  Object.keys(C).forEach(function(k){
    var v=C[k];
    el.innerHTML+='<div class="leg"><div class="ld" style="background:'+v.bg+'"></div>'+v.lb+'</div>';
  });
}

function go(btn,m){
  cur=m;
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});
  btn.classList.add("active");
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function render(){
  var m=M[cur];
  document.getElementById("mtit").textContent=m.t;
  document.getElementById("msub").textContent=m.s;
  document.getElementById("mobj").innerHTML="<b>Objetivo:</b> "+m.o;
  var st=document.getElementById("mst");
  st.innerHTML="";
  m.st.forEach(function(s){
    st.innerHTML+='<div class="stat"><div class="sn">'+s.n+'</div><div class="sl">'+s.l+'</div></div>';
  });
  var g=document.getElementById("grid");
  var h="";
  for(var i=0;i<m.sd;i++) h+='<div class="cell emp"></div>';
  for(var d=1;d<=m.dy;d++){
    var k=m.ev[d];
    var p=k?P[k]:null;
    var ic=p&&p.copa;
    var cl="cell"+(p?" hp":"")+(ic?" copa":"");
    var inn='<div class="cn">'+d+'</div>';
    if(p){
      var cv=C[p.c];
      if(ic) inn+='<div class="cbadge">'+p.lb+'</div>';
      inn+='<span class="ctag" style="background:'+cv.bg+';color:'+cv.fg+'">'+cv.lb+'</span>';
      inn+='<div class="ctitle">'+p.t+'</div>';
    }
    h+='<div class="'+cl+'"'+(p?' onclick="op(\''+k+'\')"':'')+'>'+inn+'</div>';
  }
  g.innerHTML=h;
}

function op(k){
  var p=P[k]; if(!p) return;
  var cv=C[p.c];
  document.getElementById("xd").textContent=p.d;
  document.getElementById("xt").textContent=p.t;
  document.getElementById("xc").innerHTML='<span style="display:inline-block;background:'+cv.bg+';color:'+cv.fg+';font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px">'+cv.lb+'</span>';
  document.getElementById("xf").textContent=p.fm;
  document.getElementById("xi").textContent=p.id;
  document.getElementById("xcp").textContent=p.cp;
  document.getElementById("xp").textContent=p.pl;
  document.getElementById("ov").classList.add("open");
  document.body.style.overflow="hidden";
}

function cls(){document.getElementById("ov").classList.remove("open");document.body.style.overflow="";}

document.getElementById("dlbtn").addEventListener("click",function(){
  document.getElementById("ov").classList.remove("open");
  var h="<!DOCTYPE html>\n"+document.documentElement.outerHTML;
  h=h.replace(/id="dlbtn"[^>]*>[^<]*<\/button>/,'id="dlbtn" style="display:none">');
  var b=new Blob([h],{type:"text/html;charset=utf-8"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(b);
  a.download="calendario_guarana_copa2026_responsive.html";
  a.click();
  URL.revokeObjectURL(a.href);
});

buildLeg();
render();
